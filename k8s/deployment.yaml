apiVersion: v1
kind: Service
metadata:
  namespace: zodiac
  name: orion-ui
  labels:
    app: orion-ui
spec:
  type: NodePort
  selector:
    app: orion-ui
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30081
---
apiVersion: v1
kind: ConfigMap
metadata:
  namespace: zodiac
  name: orion-ui-nginx
data:
  default.conf: |
    server {
      listen 80;
      server_name _;

      root /usr/share/nginx/html;
      index index.html;
      resolver 10.96.0.10 valid=10s;

      location / {
        try_files $uri $uri/ /index.html;
      }

      location /api/ {
        rewrite ^/api/?(.*)$ /$1 break;
        proxy_pass http://mcp-client-service.zodiac.svc.cluster.local:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location /agent-api/ {
        rewrite ^/agent-api/?(.*)$ /$1 break;
        proxy_pass http://agent-api.zodiac.svc.cluster.local:30086;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zodiac
  name: orion-ui
  labels:
    app: orion-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orion-ui
  template:
    metadata:
      labels:
        app: orion-ui
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: orion-ui
          image: git.tu-berlin.de:5000/zodiac/zodiac-meta/orion-ui@sha256:9daa57a1e1268ac5bfde3701a60206c40ad1fba5c07c9a6a944fa14dd492a21d
          imagePullPolicy: Always
          env:
            - name: VITE_CHAT_API_BASE
              value: "/api"
            - name: VITE_CHAT_API_PATH
              value: "/chat"
            - name: VITE_AGENT_API_BASE
              value: "/agent-api"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: orion-ui-nginx
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: orion-ui-nginx
          configMap:
            name: orion-ui-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: zodiac
  name: agent-api
  labels:
    app: agent-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-api
  template:
    metadata:
      labels:
        app: agent-api
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: agent
          image: git.tu-berlin.de:5000/zodiac/zodiac-meta/new-agent:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MCP_URL
              value: http://mcp-client-service:8000/chat
          ports:
            - containerPort: 30086
---
apiVersion: v1
kind: Service
metadata:
  namespace: zodiac
  name: agent-api
spec:
  type: ClusterIP
  selector:
    app: agent-api
  ports:
    - protocol: TCP
      port: 30086
      targetPort: 30086
